<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Legatus Grill | Link Bio</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                red: "#ff2a2a",
                dark: "#050505",
              },
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>

    <style>
      body {
        background:
          radial-gradient(circle at top, rgba(255, 42, 42, 0.22), transparent 35%),
          #050505;
        color: white;
      }

      .card {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(14px);
        transition: 0.3s ease;
      }

      .card:hover {
        transform: translateY(-4px) scale(1.02);
        border-color: rgba(255, 42, 42, 0.55);
        box-shadow: 0 18px 45px rgba(255, 42, 42, 0.22);
      }
    </style>
  </head>

  <body class="font-sans min-h-screen">
    <main class="max-w-md mx-auto px-6 py-10 flex flex-col items-center">

      <header class="text-center mb-10">
        <img src="/logo.png" class="w-28 h-28 rounded-full mx-auto mb-4" />
        <h1 class="text-3xl font-bold">Legatus Grill</h1>
        <p class="text-gray-400 text-sm">
          Cortes especiais na brasa · Parrilla · Defumação
        </p>
      </header>

      <section class="w-full space-y-4">

        <!-- CARDÁPIO -->
        <a
          id="link-cardapio"
          target="_blank"
          class="card rounded-2xl p-5 flex justify-between items-center"
        >
          <div>
            <h3 class="text-lg font-bold">Cardápio Grill</h3>
            <p class="text-sm text-gray-400">Veja nossos cortes</p>
          </div>

          <i data-lucide="utensils" class="w-6 h-6 text-red-500"></i>
        </a>

        <!-- WHATSAPP -->
        <a
          id="link-whatsapp"
          target="_blank"
          class="card rounded-2xl p-5 flex justify-between items-center"
        >
          <div>
            <h3 class="text-lg font-bold">Fale no WhatsApp</h3>
            <p class="text-sm text-gray-400">Faça seu pedido direto</p>
          </div>

          <i data-lucide="message-circle" class="w-6 h-6 text-green-500"></i>
        </a>

      </section>
    </main>

    <script>
      const links = {
        cardapio: "https://app.cardapioweb.com/legatusgrill#promocoes",

        // ================================
        // 🔴 ALTERE AQUI SEU WHATSAPP
        // Formato: 55 + DDD + número
        // Exemplo: 5592999999999
        // ================================

        whatsapp: "https://wa.me/message/D5BFOVFBE5UAN1"
      };

      document.getElementById("link-cardapio").href = links.cardapio;
      document.getElementById("link-whatsapp").href = links.whatsapp;

      lucide.createIcons();
    </script>
  </body>
</html>
